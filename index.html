        }</script><script>(function() {
    const translations = {
        es: {
            title: "El Metrónomo",
            tagline: "Pensado para los músicos<br><strong>Hecho por músicos</strong>",
            btn: "Descargar en Play Store",
            privacy: "Política de Privacidad",
            terms: "Términos de Uso",
            rights: "Todos los derechos reservados.",
            privacyLink: "privacy-es.html", // Añadida extensión .html
            termsLink: "terms-es.html"      // Añadida extensión .html
        },
        en: {
            title: "The Metronome",
            tagline: "Designed for musicians<br><strong>Made by musicians</strong>",
            btn: "Download on Play Store",
            privacy: "Privacy Policy",
            terms: "Terms of Service",
            rights: "All rights reserved.",
            privacyLink: "privacy-en.html", // Añadida extensión .html
            termsLink: "terms-en.html"      // Añadida extensión .html
        }
    };

    function applyTranslation(lang) {
        const t = translations[lang];
        if (!t) return;

        // 1. Traducir textos
        const textElements = {
            'mainTitle': t.title,
            'tagline': t.tagline,
            'btnText': t.btn,
            'rightsText': t.rights,
            'linkPrivacy': t.privacy,
            'linkTerms': t.terms
        };

        for (let id in textElements) {
            const el = document.getElementById(id);
            if (el) el.innerHTML = textElements[id];
        }

        // 2. Actualizar enlaces (href)
        const privacyEl = document.getElementById('linkPrivacy');
        const termsEl = document.getElementById('linkTerms');
        
        if (privacyEl) privacyEl.href = t.privacyLink;
        if (termsEl) termsEl.href = t.termsLink;
    }

    // Escuchar cambios en el selector
    document.addEventListener('change', function(e) {
        if (e.target && e.target.id === 'languagePicker') {
            applyTranslation(e.target.value);
        }
    });

    // Detectar idioma al cargar la página
    window.addEventListener('DOMContentLoaded', function() {
        const picker = document.getElementById('languagePicker');
        if (picker) {
            const userLang = navigator.language || navigator.userLanguage;
            if (userLang.startsWith('en')) {
                picker.value = 'en';
                applyTranslation('en');
            } else {
                // Forzar español si no es inglés para asegurar que los links son correctos
                applyTranslation('es');
            }
        }
    });
})();</script></body></html>
