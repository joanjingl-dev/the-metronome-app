<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Metronome | Official Site</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        /* --- SELECTOR DE IDIOMA --- */
        .lang-selector {
            position: absolute;
            top: 20px;
            right: 20px;
        }
        .lang-selector select {
            background: #222;
            color: #00e676;
            border: 1px solid #00e676;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            outline: none;
        }

        .container {
            padding: 20px;
            max-width: 600px;
        }

        .app-logo {
            max-width: 120px;
            height: auto;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 0.5rem;
            color: #00e676;
            margin-top: 0;
        }
        .tagline {
            font-size: 1.2rem;
            color: #bbb;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }
        .playstore-btn {
            display: inline-block;
            background-color: #00e676;
            color: #000;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.2s, background-color 0.2s;
            margin-bottom: 3rem;
        }
        .playstore-btn:hover {
            transform: scale(1.05);
            background-color: #00c853;
        }
        footer {
            margin-top: 2rem;
            border-top: 1px solid #333;
            padding-top: 20px;
            width: 100%;
        }
        .links a {
            color: #888;
            text-decoration: none;
            margin: 0 10px;
            font-size: 0.9rem;
        }
        .links a:hover {
            color: #00e676;
        }
        .links span { color: #444; }
        
        .legal-notice { color: #666; font-size: 0.8rem; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="lang-selector">
        <select id="languagePicker" onchange="changeLanguage()">
            <option value="es">Español 🇪🇸</option>
            <option value="en">English 🇺🇸</option>
        </select>
    </div>

    <div class="container">
        <img src="app_icon.png" alt="El Metrónomo Logo" class="app-logo">
        <h1 id="mainTitle">The Metronome</h1>
        
        <div class="tagline" id="tagline">
            Pensado para los músicos<br>
            <strong>Hecho por músicos</strong>
        </div>

        <a href="https://play.google.com/store/apps/details?hl=en_US&id=com.jjim.elmtr" class="playstore-btn" id="btnText">
            Descargar en Play Store
        </a>

        <footer>
            <div class="links">
                <a href="privacy-es.html" id="linkPrivacy">Política de Privacidad</a>
                <span>|</span>
                <a href="terms-es.html" id="linkTerms">Términos de Uso</a>
            </div>
            <p class="legal-notice">&copy; 2026 JJIMdev - <span id="rightsText">Todos los derechos reservados.</span></p>
        </footer>
    </div>

    <script>
        // Textos en ambos idiomas
        const translations = {
            es: {
                title: "El Metrónomo", // <-- Nombre en español
                tagline: "Pensado para los músicos<br><strong>Hecho por músicos</strong>",
                btn: "Descargar en Play Store",
                privacy: "Política de Privacidad",
                terms: "Términos de Uso",
                rights: "Todos los derechos reservados.",
                privacyLink: "privacy-es.html",
                termsLink: "terms-es.html"
            },
            en: {
                title: "The Metronome", // <-- Nombre en inglés
                tagline: "Designed for musicians<br><strong>Made by musicians</strong>",
                btn: "Download on Play Store",
                privacy: "Privacy Policy",
                terms: "Terms of Service",
                rights: "All rights reserved.",
                privacyLink: "privacy-en.html",
                termsLink: "terms-en.html"
            }
        };

        function changeLanguage() {
            const lang = document.getElementById('languagePicker').value;
            const t = translations[lang];

            // Actualizar Título
            document.getElementById('mainTitle').innerText = t.title;

            // Actualizar textos
            document.getElementById('tagline').innerHTML = t.tagline;
            document.getElementById('btnText').innerText = t.btn;
            document.getElementById('linkPrivacy').innerText = t.privacy;
            document.getElementById('linkTerms').innerText = t.terms;
            document.getElementById('rightsText').innerText = t.rights;

            // Actualizar enlaces a los archivos correspondientes
            document.getElementById('linkPrivacy').href = t.privacyLink;
            document.getElementById('linkTerms').href = t.termsLink;
        }

        // Detectar idioma del navegador al cargar
        window.onload = () => {
            const userLang = navigator.language || navigator.userLanguage;
            if (userLang.startsWith('en')) {
                document.getElementById('languagePicker').value = 'en';
            } else {
                document.getElementById('languagePicker').value = 'es';
            }
            changeLanguage();
        };
    </script>
</body>
</html>
